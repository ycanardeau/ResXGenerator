on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+-preview[0-9][0-9][0-9]"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
    # The Aigamo.ResXGenerator.Tests.Windows project targets net8.0-windows and can't run on Linux,
    # so test the cross-platform projects only. The released package is the analyzer, packed below.
    - name: Test
      run: dotnet test Aigamo.ResXGenerator.Tests/Aigamo.ResXGenerator.Tests.csproj --configuration Release /p:Version=${VERSION}
    - name: Pack
      run: dotnet pack Aigamo.ResXGenerator/Aigamo.ResXGenerator.csproj --configuration Release /p:Version=${VERSION} --no-build --output .
    - name: Push
      run: dotnet nuget push Aigamo.ResXGenerator.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${NUGET_TOKEN}
      env:
        NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
